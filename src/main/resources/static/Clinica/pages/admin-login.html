<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Clínica José Pardo</title>
    <link rel="icon" href="/Clinica/img/3063176.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/Clinica/css/admin-login.css">
    <script src="/Clinica/js/admin-login.js"></script>
    </head>
<body>
<div class="login-box">
    <div class="text-center mb-4">
        <img src="/Clinica/img/3063176.png" alt="Logo" height="60" class="mb-2">
        <h2>Panel de Administración</h2>
        <p class="text-muted small">Clínica José Pardo</p>
    </div>

    <div id="alerta-error" class="alert alert-danger d-none py-2 small"></div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Correo</label>
        <input type="email" id="admin-correo" class="form-control" placeholder="admin@clinica.com"
                onkeydown="if(event.key==='Enter') loginAdmin()">
    </div>
    <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-pass">
            <input type="password" id="admin-password" class="form-control" placeholder="••••••••"
                    onkeydown="if(event.key==='Enter') loginAdmin()">
            <button type="button" class="toggle-pass" onclick="togglePass()"><img src="/Clinica/img/emojis/ver-contrasena.png" width="20" height="20" alt="ver" style="vertical-align:middle;">️</button>
        </div>
    </div>

    <button class="btn btn-admin" onclick="loginAdmin()"><img src="/Clinica/img/emojis/acceso-seguro.png" width="20" height="20" alt="acceso seguro" style="vertical-align:middle;"> Ingresar</button>

    <div class="text-center mt-3">
        <a href="/Clinica/pages/index.html" class="text-muted small text-decoration-none">← Volver al inicio</a>
    </div>
</div>
</body>
</html>
