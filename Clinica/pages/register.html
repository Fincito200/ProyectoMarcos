<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Clínica José Pardo</title>
    <link href="/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Clinica/css/styles-register.css">
    <link rel="icon" href="/Clinica/img/3063176.png">
</head>
<body>

<div class="register-wrapper">

    <!-- LOGO -->
    <div class="register-logo">
        <img src="/Clinica/img/3063176.png" alt="Logo">
        <h2>Clínica José Pardo</h2>
        <p>Crea tu cuenta de paciente</p>
    </div>

    <!-- CARD -->
    <div class="card-register">

        <!-- ALERTAS -->
        <div id="alerta-error"   class="alert alert-danger  d-none py-2 small" role="alert"></div>
        <div id="alerta-exito"   class="alert alert-success d-none py-2 small" role="alert"></div>

        <span class="badge-role badge-paciente">🏥 Nuevo Paciente</span>

        <!-- FORMULARIO -->
        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label">Nombres</label>
                <input type="text" id="reg-nombres" class="form-control" placeholder="Ej: Juan Carlos">
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">Apellidos</label>
                <input type="text" id="reg-apellidos" class="form-control" placeholder="Ej: López Pérez">
            </div>
        </div>

        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label">DNI</label>
                <input type="text" id="reg-dni" class="form-control" placeholder="12345678" maxlength="8">
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">Teléfono</label>
                <input type="tel" id="reg-telefono" class="form-control" placeholder="987654321" maxlength="9">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" id="reg-correo" class="form-control" placeholder="ejemplo@gmail.com">
        </div>

        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-pass">
                    <input type="password" id="reg-password" class="form-control" placeholder="••••••••">
                    <button type="button" class="toggle-pass" onclick="togglePass('reg-password', this)">👁️</button>
                </div>
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">Confirmar contraseña</label>
                <div class="input-pass">
                    <input type="password" id="reg-password2" class="form-control" placeholder="••••••••">
                    <button type="button" class="toggle-pass" onclick="togglePass('reg-password2', this)">👁️</button>
                </div>
            </div>
        </div>

        <!-- INDICADOR DE FORTALEZA -->
        <div class="pass-strength mb-3">
            <div class="strength-bar">
                <div id="strength-fill" class="strength-fill"></div>
            </div>
            <span id="strength-label" class="strength-label"></span>
        </div>

        <button class="btn-register-main" onclick="registrar()">Crear cuenta</button>

        <hr class="divider">
        <p class="login-link">¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a></p>

    </div>
</div>

<script src="/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="/Clinica/js/register.js"></script>
</body>
</html>
