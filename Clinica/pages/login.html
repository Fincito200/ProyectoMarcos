<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Clínica</title>
    <link href="/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Clinica/css/styles-login.css">
    <link rel="icon" href="/Clinica/img/3063176.png">
</head>
<body>

<div class="card-login p-4">
    <h3 class="title">Login Clínica</h3>
    <h3 class="title">José Pardo</h3>

    <div id="alerta-error" class="alert alert-danger d-none" role="alert">
        ❌ Correo o contraseña incorrectos.
    </div>

    <form id="formLogin">
        <div class="mb-3">
            <label>Correo</label>
            <input type="email" id="correo" class="form-control" placeholder="usuario@gmail.com" required>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-clinic w-100">Ingresar</button>
    </form>

    <hr class="my-3">
    <p class="text-center mb-2 text-muted">¿No tienes una cuenta?</p>
    <a href="register.html" class="btn btn-outline-clinic w-100">Registrarse</a>
</div>

<script src="/Clinica/js/Login.js"></script>

</body>
</html>
