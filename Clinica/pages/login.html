<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Clínica José Pardo</title>
    <link href="/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Clinica/css/styles-login.css">
    <link rel="icon" href="/Clinica/img/3063176.png">
</head>
<body>

<div class="login-wrapper">

    <!-- Logo -->
    <div class="login-logo">
        <img src="/Clinica/img/3063176.png" alt="Logo">
        <h2>Clínica José Pardo</h2>
        <p>Selecciona tu tipo de acceso</p>
    </div>

    <!-- Tabs -->
    <div class="login-tabs">
        <button class="login-tab-btn active" onclick="switchTab('paciente')" id="tab-paciente">👤 Paciente</button>
        <button class="login-tab-btn" onclick="switchTab('doctor')" id="tab-doctor">👨‍⚕️ Doctor</button>
    </div>

    <!-- Card -->
    <div class="card-login">

        <div id="alerta-error" class="alert alert-danger d-none py-2 small" role="alert">
            ❌ Correo o contraseña incorrectos.
        </div>

        <!-- PANEL PACIENTE -->
        <div class="panel-form active" id="panel-paciente">
            <span class="badge-role badge-paciente">🏥 Acceso Paciente</span>
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" id="correo-paciente" class="form-control" placeholder="usuario@gmail.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password-paciente" class="form-control" placeholder="••••••••">
            </div>
            <!-- PRUEBA DE USUARIO-->
            <div class="hint-box">🔑 Prueba: <strong>juan@gmail.com</strong> / <strong>1234</strong></div>
            <!---->
            <br>
            <button class="btn-login-main" onclick="loginPaciente()">Ingresar como Paciente</button>
            <hr class="divider">
            <p class="register-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        </div>

        <!-- PANEL DOCTOR -->
        <div class="panel-form" id="panel-doctor">
            <span class="badge-role badge-doctor">🩺 Acceso Médico</span>
            <div class="mb-3">
                <label class="form-label">Correo del médico</label>
                <input type="email" id="correo-doctor" class="form-control" placeholder="doctor@clinica.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password-doctor" class="form-control" placeholder="••••••••">
            </div>
            <!-- PRUEBA DE DOCTOR-->
            <div class="hint-box doctor-hint">🔑 Prueba: <strong>joseph@clinica.com</strong> / <strong>doctor123</strong></div>
            <!---->
            <br>
            <button class="btn-login-main doctor" onclick="loginDoctor()">Ingresar como Doctor</button>
            <hr class="divider">
            <p class="register-link text-muted small text-center">Acceso restringido al personal médico</p>
        </div>

    </div>
</div>

<script src="/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="/Clinica/js/login.js"></script>
</body>
</html>
